<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f8faf9",
                        "background-dark": "#0d1510",
                        "success": "#10b981",
                        "warning": "#f59e0b",
                        "error": "#ef4444"
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-input {
            @apply w-full rounded-2xl border-gray-200 dark:border-gray-800 dark:bg-gray-900 focus:ring-primary focus:border-primary p-4 text-base;
        }
        .traffic-light-btn {
            @apply flex-1 py-4 rounded-2xl flex flex-col items-center justify-center gap-2 border-2 transition-all active:scale-95;
        }
    </style>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111813] dark:text-white flex flex-col">
<header class="flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-20 px-4 py-3 border-b border-gray-100 dark:border-gray-800">
<div class="flex size-10 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h1 class="text-[#111813] dark:text-white text-base font-semibold flex-1 text-center leading-tight">Tras la Ceremonia del Rotulador Verde</h1>
<div class="size-10"></div>
</header>
<main class="flex-1 px-5 py-8 space-y-10 max-w-md mx-auto w-full">
<div class="bg-white dark:bg-gray-900 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center gap-4">
<div class="size-14 bg-primary/15 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">brush</span>
</div>
<div>
<p class="text-[10px] font-bold text-primary uppercase tracking-[0.1em]">Interacción física finalizada</p>
<h2 class="font-bold text-xl leading-tight">Registro de Sesión</h2>
</div>
</div>
<div class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-gray-400">psychology_alt</span>
<label class="font-bold text-lg">¿Hubo conflicto?</label>
</div>
<div class="flex gap-3">
<button class="traffic-light-btn border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 text-success">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">sentiment_satisfied</span>
<span class="text-xs font-bold uppercase">Fluido</span>
</button>
<button class="traffic-light-btn border-warning/30 bg-warning/5 text-warning">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">sentiment_neutral</span>
<span class="text-xs font-bold uppercase">Tensión</span>
</button>
<button class="traffic-light-btn border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 text-error">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">sentiment_extremely_dissatisfied</span>
<span class="text-xs font-bold uppercase">Bloqueo</span>
</button>
</div>
</div>
<div class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-gray-400">military_tech</span>
<label class="font-bold text-lg">¿Qué cromo ganó?</label>
</div>
<div class="relative">
<select class="ios-input appearance-none pr-10">
<option>Seleccionar recompensa...</option>
<option>Explorador Estelar</option>
<option>Maestro del Trazo</option>
<option>Genio de la Lógica</option>
<option>Super Perseverancia</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-gray-400">smart_toy</span>
<label class="font-bold text-lg text-primary">Observaciones para la IA</label>
</div>
<div class="relative">
<textarea class="ios-input h-32 resize-none" placeholder="Ej: Le costó soltar el rotulador al terminar, pero aceptó bien la corrección..."></textarea>
</div>
<div class="flex items-start gap-3 bg-primary/5 p-4 rounded-xl border border-primary/10">
<span class="material-symbols-outlined text-primary text-xl">info</span>
<p class="text-xs text-gray-600 dark:text-gray-400 leading-relaxed">
                    Tus notas ayudan a la IA a entender la dinámica emocional y ajustar la dificultad de la próxima ficha para evitar frustraciones.
                </p>
</div>
</div>
</main>
<footer class="p-6 bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800 pb-10">
<div class="max-w-md mx-auto">
<button class="w-full flex items-center justify-center rounded-2xl h-14 bg-primary text-[#111813] text-lg font-bold shadow-xl shadow-primary/20 active:scale-[0.97] transition-all">
<span>Guardar Experiencia</span>
<span class="material-symbols-outlined ml-2">auto_awesome</span>
</button>
</div>
</footer>

</body></html>
