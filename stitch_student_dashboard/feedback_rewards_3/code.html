<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .success-gradient {
            background: radial-gradient(circle at center, rgba(19, 236, 91, 0.15) 0%, rgba(246, 248, 246, 1) 100%);
        }
        .dark .success-gradient {
            background: radial-gradient(circle at center, rgba(19, 236, 91, 0.1) 0%, rgba(16, 34, 22, 1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111813] dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-transparent p-4 justify-between w-full">
<div class="text-[#111813] dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Progreso</h2>
</div>
<!-- Main Content Area with Success Gradient -->
<main class="flex-1 flex flex-col items-center justify-center px-6 success-gradient relative overflow-hidden">
<!-- Progress Bar (Subtle) -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary/10">
<div class="h-full bg-primary w-3/4 rounded-r-full"></div>
</div>
<!-- Celebratory Illustration/Icon Area -->
<div class="relative w-full max-w-[280px] aspect-square flex items-center justify-center mb-8">
<!-- Animated Checkmarks (Visualized as static for UI design) -->
<div class="absolute -top-4 -left-4 text-primary opacity-40">
<span class="material-symbols-outlined text-5xl">check_circle</span>
</div>
<div class="absolute top-10 -right-2 text-primary opacity-60">
<span class="material-symbols-outlined text-4xl">check_circle</span>
</div>
<div class="absolute bottom-4 -left-6 text-primary opacity-30">
<span class="material-symbols-outlined text-3xl">check_circle</span>
</div>
<!-- Reward Chest -->
<div class="w-48 h-48 bg-white dark:bg-background-dark/50 rounded-full shadow-xl shadow-primary/10 flex items-center justify-center border-4 border-primary/20">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1">inventory_2</span>
</div>
</div>
<!-- Floating Reward Badge -->
<div class="absolute top-0 right-0 transform translate-x-2 -translate-y-4">
<div class="bg-primary text-[#111813] font-bold py-2 px-4 rounded-full shadow-lg flex items-center gap-2 border-2 border-white dark:border-background-dark">
<span class="material-symbols-outlined text-xl">stars</span>
<span class="text-lg">+10 Ticks</span>
</div>
</div>
</div>
<!-- Feedback Text -->
<div class="text-center space-y-3 max-w-sm">
<h1 class="text-[#111813] dark:text-white tracking-tight text-[32px] font-extrabold leading-tight">
                ¡Increíble!
            </h1>
<p class="text-[#111813] dark:text-gray-300 text-lg font-normal leading-relaxed px-2">
                ¡Excelente trabajo! Has usado la lógica de un maestro.
            </p>
</div>
<!-- Visual spacer -->
<div class="h-12"></div>
</main>
<!-- Footer Action -->
<footer class="p-6 bg-white dark:bg-background-dark border-t border-gray-100 dark:border-gray-800">
<div class="max-w-md mx-auto">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#111813] text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span class="truncate">Siguiente Ficha</span>
<span class="material-symbols-outlined ml-2">arrow_forward</span>
</button>
<div class="h-4"></div>
<!-- Progress indicator dots -->
<div class="flex justify-center gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary"></div>
<div class="h-1.5 w-4 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-gray-200 dark:bg-gray-700"></div>
</div>
</div>
</footer>
<!-- Image placeholders as requested -->
<div class="hidden">
<div class="w-full bg-center bg-no-repeat bg-cover aspect-auto rounded-none flex-1" data-alt="Abstract green success sparkles and patterns"></div>
<div class="w-full bg-center bg-no-repeat bg-cover aspect-auto rounded-none flex-1" data-alt="Wooden treasure chest with green glowing edges"></div>
</div>
</body></html>
