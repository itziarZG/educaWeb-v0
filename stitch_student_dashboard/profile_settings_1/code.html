<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Perfil y Ajustes</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111813] dark:text-white transition-colors duration-300">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-background-dark overflow-x-hidden shadow-xl">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-50 border-b border-gray-100 dark:border-gray-800">
<div class="text-[#111813] dark:text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Ajustes</h2>
</div>
<div class="flex flex-col gap-2">
<!-- SegmentedButtons -->
<div class="flex px-4 py-3 bg-white dark:bg-background-dark">
<div class="flex h-10 flex-1 items-center justify-center rounded-lg bg-[#f0f4f2] dark:bg-gray-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-gray-700 has-[:checked]:shadow-[0_0_4px_rgba(0,0,0,0.1)] has-[:checked]:text-[#111813] dark:has-[:checked]:text-white text-[#61896f] dark:text-gray-400 text-sm font-medium leading-normal">
<span class="truncate">Perfil del Niño</span>
<input checked="" class="invisible w-0" name="tab-selector" type="radio" value="child"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-gray-700 has-[:checked]:shadow-[0_0_4px_rgba(0,0,0,0.1)] has-[:checked]:text-[#111813] dark:has-[:checked]:text-white text-[#61896f] dark:text-gray-400 text-sm font-medium leading-normal">
<span class="truncate">Cuenta Familiar</span>
<input class="invisible w-0" name="tab-selector" type="radio" value="family"/>
</label>
</div>
</div>
<!-- ProfileHeader -->
<div class="flex p-4 @container bg-white dark:bg-background-dark">
<div class="flex w-full flex-col gap-4 items-center">
<div class="flex gap-4 flex-col items-center">
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full min-h-24 w-24 border-4 border-primary/20 shadow-inner" data-alt="Avatar of a smiling young boy with curly hair" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAb3jSZiveRj3q8ztLaJircg2p0fV5iaOHJZrs8tL6lsh3KPdiOBWFDhZO1nyw7oURSpz6KvQlmyG1_1QoJ8QDpQnA9eJpVcfIp7CIyyEdPH78dgV2N6Aj9VtTnTZSHnUj9169JyECeBAaLxdBLAhBLoyFGfTE9z64Y6ZVdMbvX9-UEbBb0nzueghlqxjodK87t4WwoBrcBzIiJcYdtbQDOOjGj-o-8XQdVxoweHQRtbI7JdQiKczXRRGFK34Lxb1KyX9R0PNaNyGQ");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary p-1.5 rounded-full border-2 border-white dark:border-background-dark">
<span class="material-symbols-outlined text-white text-xs">edit</span>
</div>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-[#111813] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em] text-center">Perfil de Alex</p>
<p class="text-[#61896f] dark:text-gray-400 text-sm font-normal leading-normal text-center">Configura su experiencia de aprendizaje con IA</p>
</div>
</div>
</div>
</div>
<!-- Customization Section -->
<div class="bg-white dark:bg-background-dark">
<!-- SectionHeader -->
<div class="flex items-center px-4 pt-4">
<span class="material-symbols-outlined text-primary mr-2">auto_awesome</span>
<h3 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Personalización IA</h3>
</div>
<!-- TextField for Gustos -->
<div class="flex max-w-full flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<div class="flex justify-between items-center pb-2">
<p class="text-[#111813] dark:text-white text-base font-medium leading-normal">Gustos y Pasiones</p>
<span class="text-[10px] text-primary font-bold uppercase tracking-wider">Influye en la IA</span>
</div>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111813] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary min-h-32 placeholder:text-[#61896f] dark:placeholder:text-gray-500 p-4 text-base font-normal leading-relaxed" placeholder="Ej: Le apasiona el Real Madrid, los dinosaurios y los videojuegos de aventuras..."></textarea>
</label>
</div>
<!-- Dropdown for Comunidad Autónoma -->
<div class="px-4 py-3">
<label class="block">
<p class="text-[#111813] dark:text-white text-base font-medium leading-normal pb-2">Comunidad Autónoma</p>
<div class="relative">
<select class="form-select w-full rounded-xl border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#111813] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary p-4 appearance-none">
<option>Madrid</option>
<option>Cataluña</option>
<option>Andalucía</option>
<option>Comunidad Valenciana</option>
<option>Galicia</option>
<option>País Vasco</option>
<option>Otros</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#61896f]">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
<p class="text-[#61896f] dark:text-gray-500 text-xs mt-2">Ajustamos las fichas al currículo escolar regional.</p>
</label>
</div>
</div>
<!-- Accessibility Section -->
<div class="bg-white dark:bg-background-dark mb-24">
<div class="flex items-center px-4 pt-4">
<span class="material-symbols-outlined text-primary mr-2">accessibility_new</span>
<h3 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Accesibilidad</h3>
</div>
<div class="flex flex-col gap-1 px-4 py-4">
<!-- Switch 1 -->
<div class="flex items-center justify-between py-3 border-b border-gray-50 dark:border-gray-800">
<div class="flex flex-col">
<p class="text-[#111813] dark:text-white text-base font-medium">Alto Contraste</p>
<p class="text-[#61896f] dark:text-gray-500 text-xs">Mejora la legibilidad de las fichas</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Switch 2 -->
<div class="flex items-center justify-between py-3">
<div class="flex flex-col">
<p class="text-[#111813] dark:text-white text-base font-medium">Fuente para Dislexia</p>
<p class="text-[#61896f] dark:text-gray-500 text-xs">Usa tipografías como OpenDyslexic</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>
</div>
<!-- Sticky Save Button -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Guardar Cambios
            </button>
</div>
</div>
</body></html>
