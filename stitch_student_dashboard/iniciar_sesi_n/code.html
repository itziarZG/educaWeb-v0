<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Estudia con tu Hija - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-[#102216] dark:text-white flex size-12 shrink-0 items-center justify-center cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-[#102216] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Estudia con tu Hija
            </h2>
</div>
<!-- Hero / Header Section -->
<div class="flex flex-col items-center justify-center pt-10 pb-6 px-4">
<div class="mb-6 bg-primary/20 p-4 rounded-full">
<span class="material-symbols-outlined text-primary text-5xl">auto_stories</span>
</div>
<h1 class="text-[#102216] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center pb-2">
                Welcome back
            </h1>
<p class="text-[#102216]/70 dark:text-white/70 text-base font-normal leading-normal text-center max-w-xs">
                Continue your learning journey together.
            </p>
</div>
<!-- Form Section -->
<div class="flex flex-col w-full max-w-[480px] mx-auto px-6 py-4 space-y-4">
<!-- Email Field -->
<label class="flex flex-col w-full">
<p class="text-[#102216] dark:text-white text-sm font-medium leading-normal pb-2">Email</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#102216] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-background-dark dark:text-white h-14 placeholder:text-[#102216]/40 p-[15px] text-base font-normal leading-normal" placeholder="Enter your email" type="email" value=""/>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full">
<p class="text-[#102216] dark:text-white text-sm font-medium leading-normal pb-2">Password</p>
<div class="relative flex w-full items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#102216] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-background-dark dark:text-white h-14 placeholder:text-[#102216]/40 p-[15px] text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-[#102216]/50 dark:text-white/50 flex items-center justify-center cursor-pointer" data-icon="Eye">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-sm font-medium text-[#102216]/60 dark:text-white/60 hover:text-primary transition-colors" href="#">
                    Forgot password?
                </a>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-[#102216] font-bold text-lg rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
                    Login
                </button>
</div>
<!-- Social Login Alternative (Optional Visual Divider) -->
<div class="flex items-center gap-4 py-4">
<div class="h-px bg-primary/10 flex-1"></div>
<span class="text-xs text-[#102216]/40 dark:text-white/40 uppercase tracking-widest font-bold">OR</span>
<div class="h-px bg-primary/10 flex-1"></div>
</div>
<!-- Footer Link -->
<div class="flex flex-col items-center justify-center gap-2 pt-2">
<p class="text-[#102216]/60 dark:text-white/60 text-sm">
                    Don't have an account?
                </p>
<a class="text-primary font-bold text-base hover:underline" href="#">
                    Sign up now
                </a>
</div>
</div>
<!-- Decorative Element -->
<div class="mt-auto p-8 flex justify-center opacity-10">
<div class="grid grid-cols-4 gap-4">
<span class="material-symbols-outlined text-4xl">school</span>
<span class="material-symbols-outlined text-4xl">child_care</span>
<span class="material-symbols-outlined text-4xl">favorite</span>
<span class="material-symbols-outlined text-4xl">lightbulb</span>
</div>
</div>
</div>
</body></html>
