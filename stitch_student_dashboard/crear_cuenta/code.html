<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<title>Signup - Estudia con tu Hija</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111813] dark:text-white min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-[#111813] dark:text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Estudia con tu Hija</h2>
</div>
<div class="max-w-[480px] w-full mx-auto px-4 flex flex-col items-center">
<div class="w-20 h-20 mt-8 mb-4 bg-primary/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">school</span>
</div>
<h1 class="text-[#111813] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center pb-3">Start your free trial</h1>
<p class="text-[#111813] dark:text-gray-300 text-base font-normal leading-normal pb-6 pt-1 text-center">Join our community of parents supporting their daughters' learning journey.</p>
<form class="w-full space-y-4">
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-[#111813] dark:text-gray-200 text-sm font-medium leading-normal pb-2">Parent's Name</p>
<input class="form-input flex w-full rounded-lg text-[#111813] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-[#1a2e21] h-14 placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal" placeholder="Enter your full name" type="text"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-[#111813] dark:text-gray-200 text-sm font-medium leading-normal pb-2">Email</p>
<input class="form-input flex w-full rounded-lg text-[#111813] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-[#1a2e21] h-14 placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal" placeholder="name@example.com" type="email"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full relative">
<p class="text-[#111813] dark:text-gray-200 text-sm font-medium leading-normal pb-2">Password</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111813] focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-[#1a2e21] h-14 placeholder:text-gray-400 p-[15px] pr-12 text-base font-normal leading-normal" placeholder="Create a password" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-400" data-icon="Visibility">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 h-5 w-5 rounded border-[#dbe6df] text-primary focus:ring-primary cursor-pointer" id="terms" type="checkbox"/>
<label class="text-sm text-[#111813] dark:text-gray-300 leading-tight cursor-pointer" for="terms">
                        I agree to the <a class="text-primary font-semibold underline" href="#">Terms and Conditions</a> and <a class="text-primary font-semibold underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-8 pb-12 text-center">
<p class="text-gray-500 dark:text-gray-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</div>
<div class="mt-auto p-4 flex justify-center opacity-40">
<div class="h-1 w-32 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
</body></html>
