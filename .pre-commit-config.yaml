default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: ts-check
        name: TypeScript Check
        entry: pnpm run tscheck
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        stages: [pre-commit]

      - id: lint
        name: ESLint
        entry: pnpm run lint
        language: system
        pass_filenames: false
        files: \.(ts|tsx|js|jsx)$
        stages: [pre-commit]

      - id: prettier
        name: Prettier Check
        entry: pnpm run format:check
        language: system
        pass_filenames: false
        files: \.(ts|tsx|js|jsx|json|css|md)$
        stages: [pre-commit]

      # - id: vitest
      #   name: Unit Tests
      #   entry: pnpm run test
      #   language: system
      #   pass_filenames: false
      #   stages: [pre-commit]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--verbose]
